<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Normalize -->
    <link rel="stylesheet" href="css/normalize.css">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200;0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- CSS del pueblo -->
    <link rel="stylesheet" href="css/utuado.css">

    <title>Contacto - Utuado</title>
</head>

<body>

<header class="header no-margin">
    <div class="contenedor">
        <div class="barra">

            <a class="logo" href="index.html">
                <h1 class="logo__nombre no-margin centrar-text">
                    Visita <span class="logo__bold">Utuado</span>
                </h1>
            </a>

            <nav class="navegacion">
                <a href="atractivos.html" class="enlace_nav">Atractivos</a>
                <a href="gastronomia.html" class="enlace_nav">Gastronomía</a>
                <a href="contacto.html" class="enlace_nav">Contacto</a>
                <a href="multimedia.html" class="enlace_nav">Multimedia</a>
            </nav>

        </div>
    </div>

    <div class="header__text">
        <h2 class="no-margin">Corazón del centro montañoso de Puerto Rico</h2>
    </div>
</header>

<!-- CONTENIDO CONTACTO -->
<main class="contenedor">
    <h3 class="centrar-text no-margin">Contacto</h3>

    <div class="contacto-bg"></div>

    <form class="formulario">

        <div class="campo">
            <input
                class="campo__field"
                type="text"
                placeholder="Nombre"
                id="nombre"
            >
        </div>

        <div class="campo">
            <input
                class="campo__field"
                type="email"
                placeholder="E-mail"
                id="email"
            >
        </div>

        <div class="campo">
            <textarea
                class="campo__field campo__field--textarea"
                placeholder="Mensaje"
                id="mensaje"
            ></textarea>
        </div>

        <div class="campo">
            <input type="submit" value="Enviar" class="boton boton--primario">
        </div>

    </form>
</main>

<footer class="footer">
    <div class="no-padding contenedor">
        <div class="no-padding barra">

            <a class="logo" href="index.html">
                <h1 class="logo__nombre no-margin centrar-text logo__bold">Utuado</h1>
            </a>

            <nav class="navegacion">
                <a href="atractivos.html" class="enlace_nav">Atractivos</a>
                <a href="gastronomia.html" class="enlace_nav">Gastronomía</a>
                <a href="contacto.html" class="enlace_nav">Contacto</a>
                <a href="multimedia.html" class="enlace_nav">Multimedia</a>

            </nav>

            <ul class="social-menu no-padding">
                <li><a href="#"><i class="fab fa-facebook"></i></a></li>
                <li><a href="#"><i class="fab fa-twitter"></i></a></li>
                <li><a href="#"><i class="fab fa-instagram"></i></a></li>
                <li><a href="#"><i class="fab fa-youtube"></i></a></li>
            </ul>

        </div>
    </div>
</footer>

</body>
</html>
